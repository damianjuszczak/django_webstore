{% extends 'main/layout/clean_layout.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center px-4" style="min-height: 100vh; padding: 50px 0;">
    <div style="max-width: 500px" class="w-100">
        <h1 class="mb-4">Register</h1>
        <form method="POST" action="/register">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <hr>
            <h5 class="mb-3">Profile Information (Optional)</h5>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="phone" name="phone">
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="adress" name="address">
            </div>

            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="zip_code" class="form-label">Zip Code</label>
                    <input type="text" class="form-control" id="zip_code" name="zip_code">
                </div>
            </div>

            <div class="mb-3">
                <label for="country" class="form-label">Country</label>
                <input type="text" class="form-control" id="country" name="country" value="Polska">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="newsletter" name="newsletter">
                <label class="form-check-label" for="newsletter">Sign up for newsletter</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">Register Account</button>
        </form>
    </div>
</div>
{% endblock %}
