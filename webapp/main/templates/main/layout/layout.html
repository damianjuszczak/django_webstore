{% load static %}
<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'main/css/notifications.css' %}">
    
    <title>{% block title %}Out Of Stock{% endblock %}</title>

    <style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
        /* PODPIĘCIE TŁA BEZ BLOKOWANIA (FIXED) */
        background-image: url("{% static 'main/img/os_background_pattern.png' %}");
        background-size: 500px;
        background-repeat: repeat;
        /* USUNĘLIŚMY background-attachment: fixed */
        min-height: 100vh;
    }

    /* GŁÓWNY KONTENER */
    .main-content-wrapper {
        background-color: rgba(255, 255, 255, 0.96); /* Mniejsza przezroczystość = mniejsze obciążenie */
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.05);
        /* Wyłączamy blur, jeśli strona nadal by muliła na bardzo starych kompach */
        /* backdrop-filter: blur(5px); */ 
    }

    /* KARTY PRODUKTÓW - zostawiamy, bo to lekka animacja */
    .card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04);
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
    }
</style>
</head>
<body>

    {% include 'main/layout/navbar.html' %}
    
    <main class="py-4">
        <div class="container main-content-wrapper p-3 p-md-5">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <div class="notifications-container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <script src="{% static 'main/js/notofications.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
