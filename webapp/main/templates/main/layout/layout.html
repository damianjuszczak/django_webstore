{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'main/css/notifications.css' %}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body class="bg-light">

    {% include 'main/layout/navbar.html' %}
    
    <main class="py-4">
        <div class="container-sm bg-white p-4 rounded shadow-sm" style="min-width: 997px">
            {% block content %}
            {% endblock%}
        </div>
    </main>
        <div class="notifications-container">
            {% if messages %}
                {% for message in messages %}
                    <div class="notification-item notification-{{ message.tags }}">
                        <span>{{ message }}</span>
                        <button type="button" class="btn-close notofication-close-js" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    <script src="{% static 'main/js/notofications.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
